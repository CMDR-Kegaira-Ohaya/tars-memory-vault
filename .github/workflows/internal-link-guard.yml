name: internal-link-guard

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  internal-link-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify internal markdown links under repo-manual resolve
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path('.').resolve()
          base = root / 'repo-manual'
          pattern = re.compile(r'!?\[[^\]]+\]\(([^)]+)\)')
          errors = []

          for md in base.rglob('*.md'):
              text = md.read_text(encoding='utf-8')
              for target in pattern.findall(text):
                  target = target.strip()
                  if not target:
                      continue
                  if target.startswith(('http://', 'https://', 'mailto:', '#')):
                      continue
                  target = target.split()[0]
                  target_path = target.split('#', 1)[0]
                  if not target_path:
                      continue

                  if target_path.startswith('/'):
                      dest = (root / target_path.lstrip('/')).resolve()
                  else:
                      dest = (md.parent / target_path).resolve()

                  if not dest.exists():
                      errors.append(f"{md.relative_to(root)} -> {target}")

          if errors:
              print("Broken internal markdown links found:")
              for item in errors:
                  print(item)
              sys.exit(1)

          print("All internal markdown links under repo-manual resolve.")
          PY
