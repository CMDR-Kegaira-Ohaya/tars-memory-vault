name: Apply Patch Queue

on:
  push:
    paths:
      - "patch-queue/*.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: patch-queue
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect OP Tag
        shell: bash
        run: |
          set -e
          has_a=false
          has_b=false
          for f in patch-queue/*.json; do
            [ -e "$f" ] || continue
            case "$f" in
              op-a_*) has_a=true ;;
              op-b_*) has_b=true ;;
            esac
          done
          if $has_a && ! $has_b; then
            echo "OP_TAG=op-a" >> $GITHUB_ENV
          elif $has_b && ! $has_a; then
            echo "OP_TAG=op-b" >> $GITHUB_ENV
          else
            echo "OP_TAG=" >> $GITHUB_ENV
          fi

      - name: Apply patch queue
        run: python tools/apply_patch_queue.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "tars-patch-bot"
            git config user.email "tars-patch-bot@users.noreply.github.com"
            git add -A
            if [ -n "${OP_TAG}" ]; then
              msg="${OP_TAG}: patch-queue apply pending patches"
            else
              msg="patch-queue: apply pending patches"
            fi
            git commit -m "$msg"
            git pull --rebase origin main
            git push
          else
            echo "No changes."
          fi
