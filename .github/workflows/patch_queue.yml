name: Apply Patch Queue

on:
  push:
    paths:
      - "patch-queue/*.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: patch-queue
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply patch queue
        run: python tools/apply_patch_queue.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "tars-patch-bot"
            git config user.email "tars-patch-bot@users.noreply.github.com"
            git add -A
            git commit -m "patch-queue: apply pending patches"
            git push
          else
            echo "No changes."
          fi
