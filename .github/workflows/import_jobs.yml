name: Import Jobs (zip -> repo)

on:
  push:
    branches: ["main"]
    paths:
      - "ops/import/jobs/*.json"
      - "ops/import/zips/*.zip"
      - "tools/import_jobs.py"
      - "tools/import_lib.py"
      - ".github/workflows/import_jobs.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  import_jobs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run importer
        run: |
          set -euo pipefail
          python tools/import_jobs.py

      - name: Commit and push results
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "import: jobs ${GITHUB_SHA}"
            git push
          else
            echo "No changes."
          fi
