name: Relay Worker

on:
  push:
    paths:
      - 'ops/relay/inbox/*.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: relay-worker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@2v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run relay worker
        run: python tools/relay_worker.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "tars-relay-bot"
            git config user.email "tars-relay-bot@users.noreply.github.com"
            git add -A
            git commit -m "relay: process inbox"
            git pull --rebase origin main
            git push
          else
            echo "No changes."
          fi
