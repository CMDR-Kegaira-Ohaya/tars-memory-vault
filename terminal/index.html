<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TARS Terminal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d10;
      --panel: #12171d;
      --line: #24303b;
      --text: #d7e0e8;
      --muted: #91a0ad;
      --accent: #7dd3fc;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: var(--bg);
      color: var(--text);
    }
    .shell {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      min-height: 100vh;
      gap: 12px;
      padding: 12px;
    }
    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 12px;
    }
    .status {
      white-space: pre-wrap;
      line-height: 1.5;
      color: var(--accent);
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      background: #18212a;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 8px 10px;
      cursor: pointer;
    }
    button[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 12px;
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .value { line-height: 1.6; }
    .viewport {
      min-height: 320px;
      border: 1px dashed var(--line);
      padding: 12px;
      white-space: pre-wrap;
    }
    .muted { color: var(--muted); }
    .warn { color: var(--warn); }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel">
      <div class="label">STATUS STRIP</div>
      <div id="statusStrip" class="status">booting...</div>
    </section>

    <section class="panel row" id="nav"></section>

    <section class="panel">
      <div class="label">ACTIONS</div>
      <div class="row" id="actions"></div>
      <div class="label" style="margin-top:12px;">DEV QUICK MOUNT</div>
      <div class="row">
        <button id="mountCartridge">Mount example cartridge</button>
        <button id="mountBoard">Mount live board</button>
        <button id="clearMount">Clear mount</button>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="label">HOME SUMMARY</div>
        <div id="homeSummary" class="value">loading...</div>
      </div>
      <div class="panel">
        <div class="label">RUNS VIEWPORT</div>
        <div id="runsViewport" class="viewport">loading...</div>
      </div>
    </section>
  </div>

  <script>
    const MODE_LABELS = ["home", "collections", "boards", "cartridges", "runs", "saves", "system"];
    const ACTION_KEYS = ["save", "exportSource", "exportOutput", "notes", "bookmarks"];

    const state = {
      session: null,
      manifestIndex: null,
      boardEnumeration: null,
    };

    function formatStatus(s) {
      return [
        `MODE: ${String(s.mode || "HOME").toUpperCase()}`,
        `SOURCE: ${s.source || "none"}`,
        `MOUNT: ${s.mountedKind || "none"}`,
        `STATE: ${s.state || "idle"}`,
        `RENDERER: ${s.renderer || "none"}`,
        `ENGINE: ${s.engine || "none"}`,
        `SAVE: ${s.save || "disabled"}`,
        `EXPORT SOURCE: ${s.exportSource || "disabled"}`,
        `EXPORT OUTPUT: ${s.exportOutput || "placeholder-disabled"}`,
      ].join("\n");
    }

    function deriveActionState(session) {
      if (!session.mountedKind) {
        return {
          save: "disabled",
          exportSource: "disabled",
          exportOutput: "placeholder-disabled",
          notes: "disabled",
          bookmarks: "disabled",
        };
      }
      if (session.mountedKind === "board" && session.sourceClass === "repo-board") {
        return {
          save: "disabled",
          exportSource: "enabled",
          exportOutput: "placeholder-disabled",
          notes: "disabled",
          bookmarks: "disabled",
        };
      }
      return {
        save: session.save === "disabled" ? "disabled" : "enabled-or-conditional",
        exportSource: session.exportSource === "disabled" ? "disabled" : "conditional",
        exportOutput: "placeholder",
        notes: session.save === "disabled" ? "disabled" : "enabled-or-conditional",
        bookmarks: session.save === "disabled" ? "disabled" : "enabled-or-conditional",
      };
    }

    function deriveStatusStrip(session) {
      if (!session.mountedKind) {
        return {
          mode: String(session.currentMode || "home").toUpperCase(),
          source: "none",
          mountedKind: "none",
          state: "idle",
          renderer: "none",
          engine: "none",
          save: "disabled",
          exportSource: "disabled",
          exportOutput: "placeholder-disabled",
        };
      }
      if (session.mountedKind === "board") {
        return {
          mode: "BOARDS",
          source: session.sourcePath || "live-source-path",
          mountedKind: "board",
          state: "READ-ONLY LIVE BOARD",
          renderer: session.renderer || "markdown-reader",
          engine: "none",
          save: "DISABLED",
          exportSource: "AVAILABLE",
          exportOutput: "PLACEHOLDER",
        };
      }
      return {
        mode: String(session.currentMode || "home").toUpperCase(),
        source: session.sourcePath || "mounted-source-path",
        mountedKind: "cartridge",
        state: session.state || "mounted",
        renderer: session.renderer || "unresolved",
        engine: session.engine || "none",
        save: session.actionState.save,
        exportSource: session.actionState.exportSource,
        exportOutput: session.actionState.exportOutput,
      };
    }

    function deriveViewport(session) {
      if (!session.mountedKind) {
        return {
          surface: "RUNS",
          displayMode: "empty-shell-placeholder",
          source: "none",
          mountedKind: "none",
          renderer: "none",
          engine: "none",
          readOnly: true,
          sessionPersistence: "none",
          viewState: "idle",
        };
      }
      if (session.mountedKind === "board") {
        return {
          surface: "RUNS",
          displayMode: "live-board-readout",
          source: session.sourcePath,
          mountedKind: "board",
          renderer: session.renderer || "markdown-reader",
          engine: "none",
          readOnly: true,
          sessionPersistence: "ephemeral-only",
          viewState: "read-only-live-board",
        };
      }
      return {
        surface: "RUNS",
        displayMode: session.engine ? "engine-runtime" : "renderer-readout",
        source: session.sourcePath,
        mountedKind: "cartridge",
        renderer: session.renderer || "unresolved",
        engine: session.engine || "none",
        readOnly: false,
        sessionPersistence: "allowed-via-terminal-saves",
        viewState: session.engine ? "running" : "mounted-renderable",
      };
    }

    function deriveHomeSummary(session) {
      if (!session.mountedKind) {
        return {
          mode: "HOME",
          currentMount: "none",
          recentSave: state.manifestIndex?.entries?.length ? "placeholder-from-save-index" : "none",
          currentAvailability: {
            save: "disabled",
            exportSource: "disabled",
            exportOutput: "placeholder-disabled",
          },
          quickActions: ["open-collections", "open-boards", "open-saves"],
          runsSurface: "idle-placeholder",
          notesState: "disabled",
        };
      }
      if (session.mountedKind === "board") {
        return {
          mode: "HOME",
          currentMount: "live-board",
          recentSave: "not-applicable",
          currentAvailability: {
            save: "disabled",
            exportSource: "enabled",
            exportOutput: "placeholder-disabled",
          },
          quickActions: ["resume-board-readout", "open-boards", "export-source"],
          runsSurface: "live-board-readout",
          notesState: "disabled",
        };
      }
      return {
        mode: "HOME",
        currentMount: "mounted-cartridge",
        recentSave: session.saveTag || "none",
        currentAvailability: {
          save: session.actionState.save,
          exportSource: session.actionState.exportSource,
          exportOutput: session.actionState.exportOutput,
        },
        quickActions: ["resume-runs", "open-saves", "export-source"],
        runsSurface: session.mountedViewport.displayMode,
        notesState: session.actionState.notes,
      };
    }

    function renderNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = "";
      MODE_LABELS.forEach((mode) => {
        const btn = document.createElement("button");
        btn.textContent = mode.toUpperCase();
        if (state.session.currentMode === mode) btn.style.borderColor = "#7dd3fc";
        btn.addEventListener("click", () => {
          state.session.currentMode = mode;
          refreshDerivedState();
          render();
        });
        nav.appendChild(btn);
      });
    }

    function renderActions() {
      const actions = document.getElementById("actions");
      actions.innerHTML = "";
      ACTION_KEYS.forEach((key) => {
        const btn = document.createElement("button");
        const value = state.session.actionState[key];
        btn.textContent = `${key} : ${value}`;
        btn.disabled = value.includes("disabled") || value.includes("placeholder");
        actions.appendChild(btn);
      });
    }

    function renderHomeSummary() {
      const h = state.session.homeSummary;
      document.getElementById("homeSummary").innerHTML = [
        `<div><span class="muted">mode</span> ${h.mode}</div>`,
        `<div><span class="muted">current mount</span> ${h.currentMount}</div>`,
        `<div><span class="muted">recent save</span> ${h.recentSave}</div>`,
        `<div><span class="muted">save</span> ${h.currentAvailability.save}</div>`,
        `<div><span class="muted">export source</span> ${h.currentAvailability.exportSource}</div>`,
        `<div><span class="muted">export output</span> ${h.currentAvailability.exportOutput}</div>`,
        `<div><span class="muted">runs surface</span> ${h.runsSurface}</div>`,
        `<div><span class="muted">notes</span> ${h.notesState}</div>`,
        `<div><span class="muted">quick actions</span> ${h.quickActions.join(", ")}</div>`
      ].join("");
    }

    function renderViewport() {
      const v = state.session.mountedViewport;
      const lines = [
        `surface: ${v.surface}`,
        `displayMode: ${v.displayMode}`,
        `source: ${v.source}`,
        `mountedKind: ${v.mountedKind}`,
        `renderer: ${v.renderer}`,
        `engine: ${v.engine}`,
        `readOnly: ${v.readOnly}`,
        `sessionPersistence: ${v.sessionPersistence}`,
        `viewState: ${v.viewState}`,
      ];
      if (state.session.mountedKind === "board") {
        lines.push("", "live board readout mounted from approved workspace source");
      } else if (state.session.mountedKind === "cartridge") {
        lines.push("", "repo-backed cartridge mounted in client-side runtime");
      } else {
        lines.push("", "no mount active");
      }
      document.getElementById("runsViewport").textContent = lines.join("\n");
    }

    function refreshDerivedState() {
      state.session.actionState = deriveActionState(state.session);
      state.session.statusStrip = deriveStatusStrip(state.session);
      state.session.mountedViewport = deriveViewport(state.session);
      state.session.homeSummary = deriveHomeSummary(state.session);
    }

    function mountExampleCartridge() {
      const entry = state.manifestIndex?.entries?.[0];
      if (!entry) return;
      state.session.currentMode = "collections";
      state.session.mountedId = entry.manifestId;
      state.session.mountedKind = "cartridge";
      state.session.sourcePath = entry.entry;
      state.session.sourceClass = "repo-cartridge";
      state.session.renderer = entry.type === "markdown" ? "markdown-reader" : "unresolved";
      state.session.engine = null;
      state.session.saveTag = entry.manifestId;
      state.session.save = "conditional";
      state.session.exportSource = "conditional";
      state.session.exportOutput = "placeholder";
      state.session.state = "mounted";
      refreshDerivedState();
      render();
    }

    function mountLiveBoard() {
      const entry = state.boardEnumeration?.entries?.[0];
      if (!entry) return;
      state.session.currentMode = "boards";
      state.session.mountedId = entry.boardId;
      state.session.mountedKind = "board";
      state.session.sourcePath = entry.sourcePath;
      state.session.sourceClass = "repo-board";
      state.session.renderer = "markdown-reader";
      state.session.engine = null;
      state.session.saveTag = null;
      state.session.save = "disabled";
      state.session.exportSource = "enabled";
      state.session.exportOutput = "placeholder-disabled";
      state.session.state = "read-only-live-board";
      refreshDerivedState();
      render();
    }

    function clearMount() {
      state.session.currentMode = "home";
      state.session.mountedId = null;
      state.session.mountedKind = null;
      state.session.sourcePath = null;
      state.session.sourceClass = null;
      state.session.renderer = null;
      state.session.engine = null;
      state.session.saveTag = null;
      state.session.save = "disabled";
      state.session.exportSource = "disabled";
      state.session.exportOutput = "placeholder";
      state.session.state = "idle";
      refreshDerivedState();
      render();
    }

    function render() {
      document.getElementById("statusStrip").textContent = formatStatus(state.session.statusStrip);
      renderNav();
      renderActions();
      renderHomeSummary();
      renderViewport();
    }

    async function loadJson(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`failed to load ${path}`);
      return res.json();
    }

    async function boot() {
      const [shellSession, manifestIndex, boardEnumeration] = await Promise.all([
        loadJson("app/shell-session.v1.json"),
        loadJson("manifests/manifest-index.v1.json"),
        loadJson("app/board-enumeration.v1.json")
      ]);
      state.session = structuredClone(shellSession.initialState);
      state.manifestIndex = manifestIndex;
      state.boardEnumeration = boardEnumeration;
      refreshDerivedState();
      render();
      document.getElementById("mountCartridge").addEventListener("click", mountExampleCartridge);
      document.getElementById("mountBoard").addEventListener("click", mountLiveBoard);
      document.getElementById("clearMount").addEventListener("click", clearMount);
    }

    boot().catch((error) => {
      document.getElementById("statusStrip").textContent = `BOOT ERROR\n${error.message}`;
      document.getElementById("homeSummary").innerHTML = `<span class="warn">runtime bootstrap failed</span>`;
      document.getElementById("runsViewport").textContent = "failed to load runtime contracts";
    });
  </script>
</body>
</html>
